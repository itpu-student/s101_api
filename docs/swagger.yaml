        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api_err.ApiErr'
      security:
      - BearerAuth: []
      summary: 'Admin: edit category'
      tags:
      - admin-categories
  /admin/claims:
    get:
      parameters:
      - description: pending|approved|rejected
        in: query
        name: status
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
