host: localhost:8080
info:
  contact: {}
  description: S101 backend API
  title: S101 API
  version: "1.0"
paths:
  /admin/admins:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.Page-models_Admin'
      security:
      - BearerAuth: []
      summary: 'Admin: list admins'
      tags:
      - admin-admins
    post:
      consumes:
      - application/json
      parameters:
      - description: Admin data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.CreateAdminInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Admin'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api_err.ApiErr'
      security:
      - BearerAuth: []
      summary: 'Admin: create admin'
      tags:
      - admin-admins
  /admin/admins/{id}:
    get:
      parameters:
      - description: Admin UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Admin'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api_err.ApiErr'
      security:
      - BearerAuth: []
      summary: 'Admin: get admin by ID'
      tags:
      - admin-admins
    put:
      consumes:
      - application/json
      parameters:
      - description: Admin UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.EditAdminInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Admin'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api_err.ApiErr'
      security:
      - BearerAuth: []
      summary: 'Admin: edit admin'
      tags:
      - admin-admins
  /admin/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.AdminLoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.AdminLoginOutput'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api_err.ApiErr'
      summary: Admin login
      tags:
      - admin-auth
  /admin/auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Admin'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api_err.ApiErr'
      security:
      - BearerAuth: []
      summary: Get current admin
      tags:
      - admin-auth
  /admin/categories:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Category'
            type: array
      security:
      - BearerAuth: []
      summary: 'Admin: list categories'
      tags:
      - admin-categories
  /admin/categories/{id}:
    put:
      consumes:
      - application/json
      parameters:
      - description: Category UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
