      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.Ok'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api_err.ApiErr'
      security:
      - BearerAuth: []
      summary: 'Admin: approve or reject a claim'
      tags:
      - admin-claims
  /admin/places:
    get:
